{% extends "base.html" %}
{% block content %}
    <div class="card" style="max-width: 800px; margin: 0 auto; line-height: 1.6;">
        <h2 style="color: var(--primary-color); border-bottom: 2px solid #ecf0f1; padding-bottom: 10px;">{{ title }}</h2>
        <div style="font-size: 1.1rem; color: #444; margin-top: 20px;">
            {{ content|safe }}
        </div>
    </div>
{% endblock %}

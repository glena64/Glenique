{% extends "base.html" %}
{% block content %}
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-sidebar" style="background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') no-repeat center center/cover;">
                <div style="padding: 50px;">
                    <h2>Welcome Back</h2>
                    <p>Log in to your {{ role }} account to continue your journey on {{ PLATFORM_NAME }}.</p>
                </div>
            </div>
            <div class="auth-form-container">
                <form method="POST" action="{{ url_for('login', role=role) }}" class="auth-form">
                    <div class="form-group">
                        <input type="email" name="email" required placeholder="Email Address">
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" required placeholder="Password">
                    </div>
                    <button type="submit" class="auth-btn">Log In</button>
                </form>
                <p class="auth-footer">New to {{ PLATFORM_NAME }}? 
                    <a href="{{ url_for('signup', role=role) }}" class="auth-link">Create an account</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
